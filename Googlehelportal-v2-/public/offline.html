<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>SpaceX HQ | Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #050505;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: #0f0f0f;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }
        .icon svg { width: 28px; height: 28px; color: #a1a1aa; }
        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #a1a1aa;
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto 32px;
        }
        button {
            padding: 14px 28px;
            background: #ffffff;
            color: #050505;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: filter 0.2s;
        }
        button:hover { filter: brightness(0.9); }
        .label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 700;
            color: #3f3f46;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 48px;
        }
    </style>
</head>
<body>
    <div class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.83M9.363 5.365A7 7 0 0119.07 15M6.454 6.454A7 7 0 0015 17.657" />
        </svg>
    </div>
    <h1>You're offline</h1>
    <p>No network connection detected. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
    <p class="label">SpaceX HQ &mdash; Restricted Access</p>
</body>
</html>
